[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "nvidia-model-probe"
version = "0.1.0"
description = "Safe low-rate NVIDIA Build API model availability probe with CSV/JSON/Excel reports."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [
  { name = "NVIDIA Model Probe Maintainers" }
]
dependencies = [
  "requests>=2.31.0"
]

[project.optional-dependencies]
excel = ["openpyxl>=3.1.2"]
pretty = ["rich>=13.7.0"]
all = ["openpyxl>=3.1.2", "rich>=13.7.0"]

[project.scripts]
nvidia-probe = "nvidia_probe.cli:main"

[tool.setuptools]
packages = ["nvidia_probe"]
